<h2>Clientes Ativos</h2>
<ul>
  <li *ngFor="let cliente of clientesAtivos">
    {{ cliente.nome }}
    <button (click)="inativar(cliente.id)">Inativar</button>
  </li>
</ul>

<h2>Todos os Clientes</h2>
<ul>
  <li *ngFor="let cliente of clientesTodos">
    {{ cliente.nome }} - {{ cliente.status }}
    <button (click)="ativar(cliente.id)">Ativar</button>
    <button (click)="inativar(cliente.id)">Inativar</button>
  </li>
</ul>
